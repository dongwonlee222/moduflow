name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git merge-base HEAD origin/main` works for the
          # release-check linkage gate (issue 075).
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Validate plugin package
        run: python3 scripts/validate_moduflow.py .
      - name: Release check
        run: python3 scripts/release_check.py .
